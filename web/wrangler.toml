# Cloudflare Workers fyrir Astro-appið í web/ (karp21, root = web).
# Main-workerinn (worker.js) þjónar assets ÁFRAM (ASSETS-binding) og svarar
# /api/* með proxy-um fyrir lifandi gögn. STAÐFEST Í PRODUCTION 2026-07-02:
# /api/flug svarar um workerinn — fyrra „deploy-atvik" var bara hæg CF-röð.
name = "karp21"
main = "worker.js"
compatibility_date = "2026-06-29"

[assets]
directory = "./dist"
binding = "ASSETS"

# Tengslagrunnur (D1) — landsdekkandi eigenda-/stjórnendagrunnur. Kóðinn er null-þolinn:
# ef bindingin/gögnin vantar hegðar workerinn sér nákvæmlega eins og áður.
# ⚠ database_id = dummy þar til Aron keyrir `npx wrangler d1 create tengsl`.
[[d1_databases]]
binding = "TENGSL"
database_name = "tengsl"
database_id = "00000000-0000-0000-0000-000000000000"
