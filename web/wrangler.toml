# Cloudflare Workers fyrir Astro-appið í web/ (karp21, root directory = web).
# LOTA 13: main-worker bættur við — þjónar assets ÁFRAM (ASSETS-binding) en
# svarar /api/* með proxy-um fyrir lifandi gögn (sjá worker.js).
name = "karp21"
main = "worker.js"
compatibility_date = "2026-06-29"

[assets]
directory = "./dist"
binding = "ASSETS"
