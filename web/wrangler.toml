# Cloudflare Workers fyrir Astro-appið í web/ (karp21, root = web).
# Main-workerinn (worker.js) þjónar assets ÁFRAM (ASSETS-binding) og svarar
# /api/* með proxy-um fyrir lifandi gögn. STAÐFEST Í PRODUCTION 2026-07-02:
# /api/flug svarar um workerinn — fyrra „deploy-atvik" var bara hæg CF-röð.
name = "karp21"
main = "worker.js"
compatibility_date = "2026-06-29"

[assets]
directory = "./dist"
binding = "ASSETS"
# Greidd skýrslu-gögn (persónuupplýsingar + 990 kr vara): worker keyrir FYRST svo GÁTTIN í worker.js
# nái þeim (annars þjónar CF static-skránum beint framhjá gátun). Aðrar slóðir þjónast beint sem áður.
run_worker_first = ["/gogn/eigendur/*", "/gogn/arsreikningar/*", "/gogn/stjorn/*"]

# Cron: viku-digest (mánud. 08:10 UTC) + frétta-innlestur í D1-safn (á 3 klst fresti, F7).
# scheduled()-handler í worker.js greinir á milli á event.cron.
[triggers]
crons = ["10 8 * * 1", "0 */3 * * *"]

# Tengslagrunnur (D1) — landsdekkandi eigenda-/stjórnendagrunnur.
# ✅ VIRKT 2026-07-12 (Aron bjó til grunninn). Kóðinn er null-þolinn: þótt grunnurinn
# sé enn tómur hegðar workerinn sér nákvæmlega eins og áður (auðgun finnur ekkert → óbreytt).
[[d1_databases]]
binding = "TENGSL"
database_name = "tengsl"
database_id = "6b1672e6-13da-4d14-b45a-0d83a15ccef4"
