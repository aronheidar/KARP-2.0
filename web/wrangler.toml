# Cloudflare Workers fyrir Astro-appið í web/ (karp21, root = web).
# Main-workerinn (worker.js) þjónar assets ÁFRAM (ASSETS-binding) og svarar
# /api/* með proxy-um fyrir lifandi gögn. STAÐFEST Í PRODUCTION 2026-07-02:
# /api/flug svarar um workerinn — fyrra „deploy-atvik" var bara hæg CF-röð.
name = "karp21"
main = "worker.js"
compatibility_date = "2026-06-29"

[assets]
directory = "./dist"
binding = "ASSETS"

# Tengslagrunnur (D1) — landsdekkandi eigenda-/stjórnendagrunnur.
# ⚠ BINDING ER AF-VIRKJUÐ VILJANDI þar til grunnurinn er til: Cloudflare STAÐFESTIR
# database_id við DEPLOY (ekki bara runtime) og HAFNAR deploy-i ef id-ið er ekki til —
# sem myndi loka á ALLAR main-ýtingar (síða+worker deploya saman). Kóðinn er null-þolinn
# (env.TENGSL undefined → nákvæmlega eins og áður), svo það er ÖRUGGT að skipa bindingunni
# ekki fyrr en grunnurinn er til.
#
# ARON, til að kveikja: keyrðu `npx wrangler d1 create tengsl` (í web/), af-athugasemdaðu
# blokkina að neðan og settu raunverulegt database_id (eða sendu mér id-ið):
#
# [[d1_databases]]
# binding = "TENGSL"
# database_name = "tengsl"
# database_id = "<raunverulegt-id-úr-wrangler-d1-create>"
