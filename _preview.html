(function(){
  var real=window.fetch.bind(window);
  function J(o){return Promise.resolve(new Response(JSON.stringify(o),{status:200,headers:{'Content-Type':'application/json'}}));}
  var now=Math.floor(Date.now()/1000);
  function timeline(){var a=[];for(var i=29;i>=0;i--){var d=new Date(Date.now()-i*86400000);a.push({d:d.toISOString().slice(0,10),n:Math.max(0,Math.round(2+2*Math.sin(i/3)+(i%5===0?3:0))),idx:Math.round(-30+40*Math.sin(i/5)),scored:5});}return a;}
  window.fetch=function(url,opt){
    var u=String(url);
    if(u.indexOf('/wp-json/karp/v1/newsstatus')>-1){return J({ready:true,count:13247,sources:8,oldest:now-160*86400,newest:now-1800,last:{t:now-1800,added:14},next:now+1800,feeds:9});}
    if(u.indexOf('/wp-json/karp/v1/firmacompare')>-1){return J({ready:true,days:30,companies:[{name:"Icelandair",n:42},{name:"Alvotech",n:31},{name:"Arion banki",n:22},{name:"JBT Marel",n:18},{name:"Síminn",n:9}]});}
    if(u.indexOf('/wp-json/karp/v1/firmagraph')>-1){
      var ents=null;try{ents=(opt&&opt.body)?JSON.parse(opt.body).entities:null;}catch(e){}
      if(ents&&ents.length){var nm=ents.slice(0,12).map(function(e){return e.n;});var nodes=nm.map(function(n,i){return {name:n,val:24-i};});var links=[];for(var i=0;i+1<nm.length&&i<8;i++)links.push({source:nm[i],target:nm[i+1],value:Math.max(1,6-i)});if(nm.length>4)links.push({source:nm[0],target:nm[3],value:3});return J({ready:true,days:180,nodes:nodes,links:links});}
      return J({ready:true,days:180,nodes:[
      {name:"Icelandair",val:96},{name:"Alvotech",val:23},{name:"Arion banki",val:18},{name:"Íslandsbanki",val:14},{name:"Landsvirkjun",val:12},
      {name:"JBT Marel",val:10},{name:"Síminn",val:9},{name:"Hagar",val:8},{name:"Festi",val:7},{name:"Nova",val:6},{name:"Eimskip",val:5},{name:"Sýn",val:4},{name:"Isavia",val:5}
    ],links:[
      {source:"Arion banki",target:"Íslandsbanki",value:6},{source:"Icelandair",target:"Isavia",value:5},{source:"Síminn",target:"Sýn",value:4},
      {source:"Hagar",target:"Festi",value:4},{source:"Alvotech",target:"Arion banki",value:3},{source:"Icelandair",target:"Eimskip",value:3},{source:"Landsvirkjun",target:"Eimskip",value:2}
    ]});}
    if(u.indexOf('/wp-json/karp/v1/topwords')>-1){return J({ready:true,words:[{w:"verðbólga",n:42},{w:"ríkisstjórn",n:38},{w:"trump",n:35},{w:"kjarasamningar",n:28},{w:"icelandair",n:24},{w:"húsnæði",n:22},{w:"vextir",n:19},{w:"alþingi",n:17},{w:"lögreglan",n:15},{w:"orkuskipti",n:12},{w:"evrópusambandið",n:10},{w:"loftslag",n:8}]});}
    if(u.indexOf('/wp-json/karp/v1/agenda')>-1){var tp=null;try{tp=(opt&&opt.body)?JSON.parse(opt.body).topics:null;}catch(e){}var names=(tp||[]).slice(0,16).map(function(e){return e.n;});var wk=[];for(var wi=20;wi>=0;wi--){wk.push(new Date(Date.now()-wi*7*86400000).toISOString().slice(0,10));}var tps=names.map(function(nm,k){var weeks=wk.map(function(_,j){return Math.max(0,Math.round(9-k+5*Math.sin((j+k)/3)));});return {n:nm,total:weeks.reduce(function(a,b){return a+b;},0),recent:8+((k*7)%18),prior:8+((k*13)%18),weeks:weeks};});tps.sort(function(a,b){return b.total-a.total;});return J({ready:true,weekKeys:wk,topics:tps,days:180});}
    if(u.indexOf('/wp-json/karp/v1/me')>-1){if(opt&&opt.method==='POST'){return J({ok:true});}return J({ok:true,fields:{sveitarfelag:"Kópavogsbær",kjordaemi:"Suðvesturkjördæmi",ahugasvid:["Sveitarstjórnir","Markaðir"]}});}
    if(u.indexOf('/wp-json/karp/v1/yearreview')>-1){var mm=["2026-01","2026-02","2026-03","2026-04","2026-05","2026-06"];var months=mm.map(function(k,i){return {m:k,n:7800+Math.round(1800*Math.sin(i/2)),scored:7600+Math.round(1700*Math.sin(i/2)),idx:-18+Math.round(22*Math.sin(i/1.7))};});return J({ready:true,year:2026,total:51493,scored:51001,months:months,bySource:[{s:"Vísir",n:28924},{s:"RÚV",n:7699},{s:"mbl.is",n:6800},{s:"DV",n:4200},{s:"Mannlíf",n:1185}],best:{m:"2026-03",idx:9},worst:{m:"2026-01",idx:-30}});}
    if(u.indexOf('/wp-json/karp/v1/firma')>-1){

      return J({ready:true,total:58,items:_items,timeline:timeline(),words:[{w:"icelandair",n:58},{w:"flug",n:24},{w:"sæti",n:12},{w:"afkoma",n:9},{w:"sumar",n:7},{w:"leiðir",n:5}],stats:{perDay:1.9,avgWords:7.4,sources:[{s:"mbl.is",n:28},{s:"Vísir",n:14},{s:"Viðskiptablaðið",n:9},{s:"RÚV",n:7}]},sentiment:{idx:(u.indexOf('and=')>-1?-12:-28),n:50,pos:12,neu:20,neg:18,scored:(u.indexOf('and=')>-1?14:50),total:(u.indexOf('and=')>-1?18:58),bySource:[{s:"mbl.is",n:28,idx:-40,pos:5,neu:9,neg:14},{s:"Vísir",n:14,idx:-7,pos:4,neu:7,neg:3},{s:"RÚV",n:7,idx:14,pos:3,neu:3,neg:1},{s:"DV",n:6,idx:-50,pos:0,neu:3,neg:3}]}});
    }
    if(u.indexOf('/wp-json/karp/v1/frettir')>-1){return J({items:[{title:"Verðbólga mælist 4,1% í júní",source:"RÚV",link:"https://ruv.is/x",date:now-7200},{title:"Króna styrkist gagnvart evru",source:"mbl.is",link:"https://mbl.is/y",date:now-9000}]});}
    return real(url,opt);
  };
})();
</script>
</head><body>
<script>
fetch('wordpress/karp-embed.html?v='+Date.now(),{cache:'no-store'}).then(function(r){return r.text();}).then(function(html){
  var doc=new DOMParser().parseFromString(html,'text/html');
  var nodes=Array.prototype.slice.call(doc.head.childNodes).concat(Array.prototype.slice.call(doc.body.childNodes));
  nodes.forEach(function(n){
    if(n.nodeType===1&&n.tagName==='SCRIPT'){
      var s=document.createElement('script');if(n.src)s.src=n.src;else s.textContent=n.textContent;document.body.appendChild(s);
    }else{try{document.body.appendChild(document.importNode(n,true));}catch(e){}}
  });
}).catch(function(e){document.body.innerHTML='<pre style="color:#f88">preview load error: '+e+'</pre>';});
</script>
</body></html>
