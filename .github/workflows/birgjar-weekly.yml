# LOTA 18 #8 — vikuleg birgjagreining ríkisins.
# build_birgjar.js sækir 12 mánuði af XLSX-um frá opnirreikningar.is (~2,6 m
# færslur, nokkrar mínútur) — of þungt fyrir daglega keyrslu, mánudagar duga
# (gögn Fjársýslunnar uppfærast mánaðarlega hvort eð er).
name: birgjar-weekly

on:
  schedule:
    - cron: '30 4 * * 1'       # mánudaga kl. 04:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: birgjar-weekly
  cancel-in-progress: false

jobs:
  birgjar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Deps (xlsx)
        run: npm ci
      - name: Birgjagreining (12 mánuðir af opnirreikningar.is)
        run: node skriptur/build_birgjar.js
      - name: YouTube-rásauppgötvun (vikuleg full leit)
        run: node skriptur/build_ytras.js || true
      - name: GPS-hnit heimilisfanga (staðfangaskrá, uppfærð sunnudagskvöld)
        run: node skriptur/build_hnit.js || true
      - name: Refsilistar (ESB + SÞ + OFAC → nafna-index, F9 þvingunaraðgerða-skimun)
        run: node skriptur/build_sanctions.mjs || true   # ~5,5MB, listar breytast hægt → vikulega
      - name: Flotavísir (skipaskrá island.is → kt→skipnr → aflamark per fiskveiðifélag)
        run: node skriptur/build_skip_owners.mjs || true # ~7600 island.is-köll (~6 mín), flotinn breytist hægt → vikulega
      - name: Loftfaraskrá (island.is → kt→loftför per félag)
        run: node skriptur/build_loftfor.mjs || true     # 1 island.is-kall (356 loftför), skráin breytist hægt → vikulega
      - name: Committa ef breyting
        run: |
          if [ -n "$(git status --porcelain -- gogn/birgjar.json gogn/ytras.json web/public/gogn/hnit/ web/public/gogn/sanctions.json web/public/gogn/skip_owners.json web/public/gogn/loftfor.json)" ]; then
            git config user.name  "karp-bot"
            git config user.email "karp-bot@users.noreply.github.com"
            git add gogn/birgjar.json gogn/ytras.json web/public/gogn/hnit/ web/public/gogn/sanctions.json web/public/gogn/skip_owners.json web/public/gogn/loftfor.json
            git commit -m "data: vikuleg birgja-, YouTube-, hnita-, refsilista-, flotavísis- og loftfara-uppfærsla ($(date -u +%F))"
            git pull --rebase origin main || true
            git push origin HEAD:main || { git pull --rebase origin main && git push origin HEAD:main; } || { echo "✗ push brást — athugaðu branch protection/Workflow permissions."; exit 1; }
          else
            echo "• Engin breyting á birgjagögnum."
          fi
