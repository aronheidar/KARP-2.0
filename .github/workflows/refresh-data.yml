# Á4 — sjálfvirkur gagnaferskleiki (#1b felld inn í #2).
# ---------------------------------------------------------------------------
# Keyrir CI-öruggu gagnaskriftina build_polls.js reglulega (aðeins fetch á
# Wikipedia — engir lyklar, engin staðbundin skjöl, engar npm-deps).
#   • Breytist polls.json → commit + push → Cloudflare endurbyggir BÆÐI verkefnin
#     (karp21 = Astro SSG-síður, git-repository-hagvisir = karp-app.js) → fersk
#     sætaspá (althingi) OG fersk karp-data (mælaborð).
#   • Engin breyting → (valfrjálst) deploy hook þvingar endurbyggingu svo
#     efnahagur sæki ferska verðbólgu frá Hagstofu á byggingartíma.
#     Án hook ferskast efnahagur hvort eð er við næstu polls-ýtingu (~vikulega).
#
# ⚠ Handvirkt áfram (ekki CI-öruggt): sveitarfélaga-gögn (atvinnuleysi/fasteignir
#   = xlsx/xlsm), afbrot, orka o.fl. → sveitarfelog-síðan ferskast við handvirka
#   gogn/-uppfærslu + push. Sjá „Gagnapípan" í wiki.
name: refresh-data

on:
  schedule:
    - cron: '0 6 * * *'      # daglega kl. 06:00 UTC
  workflow_dispatch: {}       # + handvirkt í Actions-flipanum

permissions:
  contents: write             # svo botninn geti committað fersk gögn

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Deps (xlsx o.fl. fyrir gagnaskriftur)
        run: npm ci

      # LOTA 18 #6: allar CI-öruggu skripturnar (aðeins net-fetch + committed deps).
      # || true → ein biluð veita fellir ekki restina; committað er því sem tókst.
      - name: Alþingi (mál, atkvæði, nefndir, dagatal, ræður, laun)
        run: |
          node skriptur/build_althingi.js   || true
          node skriptur/build_frumvorp.js   || true
          node skriptur/build_votes.js      || true
          node skriptur/build_votemap.js    || true
          node skriptur/build_committees.js || true
          node skriptur/build_dagatal.js    || true
          node skriptur/build_cabinet.js    || true
          node skriptur/build_laun.js       || true
          node skriptur/build_raedur.js     || true
      - name: Kannanir + markaðir + samfélag
        run: |
          node skriptur/build_polls.js          || true
          node skriptur/build_markadir.js       || true
          node skriptur/build_raunvirdi.js      || true
          node skriptur/build_sveitarstjorar.js || true
          node skriptur/build_sendirad.js       || true
      - name: Þyngri veitur (HMS, VMST, lögregla, orka, Numbeo)
        run: |
          node skriptur/build_fasteignir.js   || true
          node skriptur/build_leiga.js        || true
          node skriptur/build_atvinnuleysi.js || true
          node skriptur/build_glaepir.js      || true
          node skriptur/build_orka.js         || true
          node skriptur/build_numbeo.js       || true
      - name: AI-samantektir (aðeins sé lykill settur sem secret)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            node skriptur/build_summaries.js || true
            node skriptur/build_malrof_ai.js || true
          else
            echo "• Enginn ANTHROPIC_API_KEY-secret — AI-skriftum sleppt."
          fi
      - name: Samhengispakki Spyrðu Karp (úr ferskum gögnum)
        run: node skriptur/build_spyrdu_context.js || true

      - name: Committa ef breyting — annars þvinga endurbyggingu
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if ! git diff --quiet -- gogn/ web/public/gogn/; then
            git config user.name  "karp-bot"
            git config user.email "karp-bot@users.noreply.github.com"
            git add gogn/ web/public/gogn/
            git commit -m "data: sjálfvirk gagnauppfærsla ($(date -u +%F))"
            git push
            echo "✔ Gögn breyttust → ýtt. Cloudflare endurbyggir bæði verkefnin."
          elif [ -n "$CF_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$CF_DEPLOY_HOOK" >/dev/null \
              && echo "✔ Engin gagnabreyting → deploy hook þvingaði endurbyggingu (fersk Hagstofa)."
          else
            echo "• Engin breyting og enginn CF_DEPLOY_HOOK — sleppi. efnahagur ferskast við næstu gagna-ýtingu."
          fi
